backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

site_url: https://sharboauto.com
display_url: https://sharboauto.com
logo_url: /assets/images/logo.jpeg

collections:
  - name: "data"
    label: "Inventaire"
    files:
      - name: "vehicles"
        label: "Véhicules"
        file: "data/vehicles.json"
        format: "json"
        fields:
          - label: "Véhicules"
            name: "vehicles"
            widget: "list"
            summary: "{{fields.title}} - {{fields.year}} - ${{fields.price}}"
            fields:
              - label: "ID unique"
                name: "id"
                widget: "string"
                hint: "Ex: honda-accord-2016"

              - label: "Titre"
                name: "title"
                widget: "string"
                hint: "Ex: Honda Accord EX-L 2016"

              - label: "Marque"
                name: "brand"
                widget: "string"
                hint: "Ex: Honda"

              - label: "Modèle"
                name: "model"
                widget: "string"
                hint: "Ex: Accord EX-L"

              - label: "Année"
                name: "year"
                widget: "number"
                value_type: "int"

              - label: "Prix"
                name: "price"
                widget: "number"
                value_type: "int"

              - label: "Kilométrage"
                name: "mileage"
                widget: "number"
                value_type: "int"

              - label: "Transmission"
                name: "transmission"
                widget: "select"
                options:
                  - "Automatique"
                  - "Manuelle"
                  - "CVT"

              - label: "Carburant"
                name: "fuel"
                widget: "select"
                options:
                  - "Essence"
                  - "Hybride"
                  - "Électrique"
                  - "Diesel"

              - label: "VIN"
                name: "vin"
                widget: "string"
                required: false

              - label: "Statut"
                name: "status"
                widget: "select"
                options:
                  - "Disponible"
                  - "Vendu"
                  - "Réservé"
                default: "Disponible"

              - label: "Afficher en vedette"
                name: "featured"
                widget: "boolean"
                default: false
                required: false

              - label: "Photos"
                name: "images"
                widget: "list"
                summary: "{{fields.image}}"
                hint: "La première photo dans la liste sera la photo principale du véhicule."
                field:
                  label: "Photo"
                  name: "image"
                  widget: "image"

              - label: "Lien Carfax"
                name: "carfax"
                widget: "string"
                required: false
                hint: "Collez le lien Carfax ici si disponible."

              - label: "Description FR"
                name: "description_fr"
                widget: "text"
                required: false

              - label: "Description EN"
                name: "description_en"
                widget: "text"
                required: false
