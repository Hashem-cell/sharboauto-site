backend:
  name: git-gateway
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

site_url: https://sharboauto.com
display_url: https://sharboauto.com
logo_url: /assets/images/logo.jpeg

collections:
  collections:
  - name: "data"
    label: "Inventaire"
    files:
      - name: "vehicles"
        label: "Véhicules"
        file: "data/vehicles.json"
        format: "json"
        fields:
          - label: "Véhicules"
            name: "vehicles"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Marque", name: "brand", widget: "string" }
              - { label: "Modèle", name: "model", widget: "string" }
              - { label: "Année", name: "year", widget: "number" }
              - { label: "Prix", name: "price", widget: "number" }
              - { label: "Kilométrage", name: "mileage", widget: "number" }
              - { label: "Transmission", name: "transmission", widget: "string" }
              - { label: "Carburant", name: "fuel", widget: "string" }
              - { label: "VIN", name: "vin", widget: "string", required: false }
              - { label: "Statut", name: "status", widget: "string" }
              - { label: "Vedette", name: "featured", widget: "boolean", required: false }
              - label: "Images"
                name: "images"
                widget: "list"
                field:
                  label: "Image"
                  name: "image"
                  widget: "string"
              - { label: "Carfax", name: "carfax", widget: "string", required: false }
              - { label: "Description FR", name: "description_fr", widget: "text", required: false }
              - { label: "Description EN", name: "description_en", widget: "text", required: false }
