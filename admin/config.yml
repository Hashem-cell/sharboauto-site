backend:
  name: github
  repo: Hashem-cell/sharboauto-site
  branch: main

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

site_url: https://sharboauto.com
display_url: https://sharboauto.com
logo_url: /assets/images/logo.jpeg

collections:
  - name: "data"
    label: "Inventaire"
    files:
      - name: "vehicles"
        label: "Véhicules"
        file: "data/vehicles.json"
        format: "json"
        fields:
          - label: "Véhicules"
            name: "vehicules"
            widget: "list"
            summary: "{{fields.title}} - {{fields.year}} - ${{fields.price}}"
            fields:
              - { label: "ID unique", name: "id", widget: "string", hint: "Ex: honda-accord-2018" }
              - { label: "Titre", name: "title", widget: "string", hint: "Ex: Honda Accord Touring" }
              - { label: "Marque", name: "brand", widget: "string" }
              - { label: "Modèle", name: "model", widget: "string" }
              - { label: "Année", name: "year", widget: "number", value_type: "int" }
              - { label: "Prix", name: "price", widget: "number", value_type: "int" }
              - { label: "Kilométrage", name: "mileage", widget: "number", value_type: "int" }
              - { label: "Transmission", name: "transmission", widget: "select", options: ["Automatique", "Manuelle", "CVT"] }
              - { label: "Carburant", name: "fuel", widget: "select", options: ["Essence", "Hybride", "Électrique", "Diesel"] }
              - { label: "VIN", name: "vin", widget: "string", required: false }
              - { label: "Statut", name: "status", widget: "select", options: ["Disponible", "Vendu", "Réservé"], default: "Disponible" }
              - { label: "Véhicule en vedette", name: "featured", widget: "boolean", default: false }
              - { label: "Photos", name: "images", widget: "list", field: { label: "Photo", name: "image", widget: "image" } }
              - { label: "Carfax PDF ou lien", name: "carfax", widget: "string", required: false }
              - { label: "Description FR", name: "description_fr", widget: "text", required: false }
              - { label: "Description EN", name: "description_en", widget: "text", required: false }
